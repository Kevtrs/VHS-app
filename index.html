<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>VHS — Compagnon V8.1</title>
<style>
:root{
  --bg:#050403;
  --panel:#130f0d;
  --panel2:#090706;
  --bone:#eadbc4;
  --gold:#c8aa72;
  --muted:#9d8663;
  --red:#8f2724;
  --red2:#e1544b;
  --line:rgba(234,219,196,.28);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;
  width:100%;
  min-height:100%;
  background:#050403;
  color:var(--bone);
  font-family:Georgia,"Times New Roman",serif;
}
body{
  overflow-x:hidden;
  background:
    radial-gradient(circle at 50% 0%,rgba(143,39,36,.16),transparent 27%),
    linear-gradient(180deg,#080706,#020202);
}
body:before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.15;
  background:
    repeating-linear-gradient(0deg,rgba(255,255,255,.025) 0 1px,transparent 1px 5px),
    url("data:image/svg+xml,%3Csvg viewBox='0 0 160 160' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='160' height='160' filter='url(%23n)' opacity='.6'/%3E%3C/svg%3E");
  mix-blend-mode:screen;
}
button{border:0;background:none;color:inherit;font:inherit;touch-action:manipulation}
.app{
  min-height:100vh;
  min-height:100dvh;
  padding:calc(8px + env(safe-area-inset-top)) 10px calc(22px + env(safe-area-inset-bottom));
  position:relative;
  z-index:1;
}
.shell{
  width:100%;
  max-width:1040px;
  margin:0 auto;
}
.header{
  display:grid;
  grid-template-columns:auto 1fr;
  align-items:start;
  gap:10px;
  margin-bottom:9px;
}
.logo{
  font-size:clamp(38px,12vw,54px);
  line-height:.82;
  font-weight:900;
  letter-spacing:2px;
  text-shadow:0 3px 0 #000;
}
.version{
  margin-top:6px;
  color:var(--muted);
  font-family:system-ui,-apple-system,Segoe UI,sans-serif;
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:1.5px;
}
.actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:7px;
  justify-self:end;
  width:min(250px,100%);
}
.btn{
  min-height:38px;
  padding:8px 10px;
  border-radius:999px;
  border:1px solid rgba(234,219,196,.25);
  background:linear-gradient(180deg,rgba(31,24,19,.95),rgba(8,6,5,.95));
  color:var(--bone);
  font-family:system-ui,-apple-system,Segoe UI,sans-serif;
  font-size:12px;
  font-weight:850;
  text-align:center;
  box-shadow:0 8px 18px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.04);
}
.btn.active{border-color:rgba(143,39,36,.85);color:#ffd8d2}
.btn.wide{grid-column:1/-1}
.btn:active,.round:active,.token:active,.shield:active{transform:scale(.96)}
.board{
  display:grid;
  gap:9px;
}
.ritual,.card,.history{
  border:1px solid var(--line);
  background:
    radial-gradient(circle at 50% 0%,rgba(234,219,196,.045),transparent 32%),
    linear-gradient(180deg,rgba(18,14,12,.98),rgba(5,4,3,.98));
  box-shadow:inset 0 0 0 5px rgba(0,0,0,.23),0 12px 28px rgba(0,0,0,.30);
}
.ritual,.card{
  position:relative;
  overflow:hidden;
}
.ritual:before,.card:before{
  content:"";
  position:absolute;
  inset:8px;
  border:1px dotted rgba(234,219,196,.26);
  border-radius:14px;
  pointer-events:none;
}
.ritual{
  border-radius:20px;
  padding:12px;
}
.ritual-head{
  display:grid;
  grid-template-columns:38px 1fr 38px;
  align-items:center;
  gap:6px;
}
.emoji-big{
  font-size:30px;
  text-align:center;
}
.ritual-title{
  text-align:center;
  text-transform:uppercase;
  letter-spacing:2.2px;
  font-size:clamp(28px,8vw,44px);
  line-height:.95;
  font-weight:900;
  text-shadow:0 3px 0 #000;
  white-space:nowrap;
}
.ritual-mid{
  display:grid;
  grid-template-columns:58px 1fr 58px;
  align-items:center;
  gap:8px;
  margin:8px 0 4px;
}
.round{
  width:52px;
  height:52px;
  border-radius:50%;
  border:1px solid rgba(234,219,196,.34);
  background:radial-gradient(circle at 35% 25%,rgba(255,255,255,.08),transparent 28%),linear-gradient(180deg,#211915,#060504);
  display:grid;
  place-items:center;
  font-size:33px;
  line-height:1;
  box-shadow:inset 0 0 0 2px rgba(0,0,0,.45),0 8px 16px rgba(0,0,0,.30);
  user-select:none;
}
.ritual-hp{text-align:center}
.ritual-num{
  display:block;
  font-size:clamp(62px,17vw,92px);
  line-height:.82;
  font-weight:900;
  text-shadow:0 5px 0 #000;
}
.ritual-max{
  display:block;
  margin-top:-2px;
  color:var(--muted);
  font-family:system-ui,-apple-system,Segoe UI,sans-serif;
  font-size:13px;
  font-weight:700;
}
.label{
  margin:9px 0 6px;
  text-align:center;
  color:var(--gold);
  font-size:clamp(16px,4.5vw,22px);
  line-height:1;
  text-transform:uppercase;
  letter-spacing:2px;
}
.tokens{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:7px;
  padding:0 8px;
}
.token{
  aspect-ratio:1/1;
  width:100%;
  border-radius:50%;
  border:2px solid rgba(234,219,196,.48);
  background:#080706;
  box-shadow:inset 0 0 9px rgba(0,0,0,.85);
}
.token.on{background:linear-gradient(145deg,#eadbc4,#83663f);box-shadow:0 0 14px rgba(200,170,114,.24)}
.shields{
  display:flex;
  justify-content:center;
  gap:8px;
}
.shield{
  width:44px;
  height:40px;
  border-radius:14px;
  border:1px solid rgba(234,219,196,.28);
  background:#080706;
  opacity:.42;
  display:grid;
  place-items:center;
  font-size:24px;
}
.shield.on{
  opacity:1;
  background:linear-gradient(180deg,rgba(234,219,196,.16),rgba(0,0,0,.18));
}
.players{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:9px;
}
.card{
  min-width:0;
  min-height:158px;
  border-radius:18px;
  padding:11px;
}
.card.killer{border-color:rgba(143,39,36,.50)}
.card.dead{filter:grayscale(.48);border-color:rgba(225,84,75,.58)}
.card.critical .num{color:#ff6b62;animation:pulse 1s infinite}
.card.critical .bar-fill{background:linear-gradient(90deg,#641512,#e1544b)}
.player-head{
  position:relative;
  z-index:2;
  display:grid;
  grid-template-columns:32px 1fr;
  gap:7px;
  align-items:start;
}
.role{
  font-size:28px;
  line-height:1;
  text-align:center;
}
.player-name{
  min-width:0;
  text-align:center;
  text-transform:uppercase;
  letter-spacing:1px;
  font-size:clamp(16px,4.7vw,21px);
  line-height:.95;
  font-weight:900;
  text-shadow:0 2px 0 #000;
  overflow-wrap:anywhere;
}
.player-name[contenteditable="true"]:focus{
  outline:1px dashed rgba(234,219,196,.40);
  border-radius:7px;
}
.player-hp{
  position:relative;
  z-index:2;
  text-align:center;
  margin-top:7px;
}
.num{
  font-size:clamp(54px,17vw,78px);
  line-height:.84;
  font-weight:900;
  text-shadow:0 4px 0 #000;
}
.max{
  color:var(--muted);
  font-family:system-ui,-apple-system,Segoe UI,sans-serif;
  font-size:15px;
  font-weight:800;
}
.card-controls{
  position:relative;
  z-index:2;
  display:flex;
  justify-content:center;
  gap:16px;
  margin-top:8px;
}
.card-controls .round{
  width:45px;
  height:45px;
  font-size:29px;
}
.bar{
  position:relative;
  z-index:2;
  height:10px;
  margin-top:10px;
  border:1px solid rgba(234,219,196,.22);
  border-radius:999px;
  overflow:hidden;
  background:#050403;
}
.bar-fill{
  height:100%;
  background:linear-gradient(90deg,#8f754d,var(--bone));
  transition:width .16s ease;
}
.dead-badge{
  display:none;
  position:absolute;
  z-index:4;
  left:50%;
  bottom:7px;
  transform:translateX(-50%);
  padding:4px 10px;
  border-radius:999px;
  border:1px solid rgba(225,84,75,.75);
  background:rgba(55,7,6,.72);
  color:#ffd7d2;
  font-family:system-ui,-apple-system,Segoe UI,sans-serif;
  font-size:9px;
  font-weight:900;
  letter-spacing:1.5px;
  white-space:nowrap;
}
.card.dead .dead-badge{display:block}
.tools{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.history{
  border-radius:16px;
  color:rgba(234,219,196,.72);
  padding:8px 10px;
  font-family:system-ui,-apple-system,Segoe UI,sans-serif;
  font-size:12px;
  text-align:center;
  line-height:1.35;
  max-height:70px;
  overflow:auto;
}
.float{
  position:absolute;
  right:14px;
  top:52%;
  z-index:10;
  font-size:34px;
  color:#ff6b62;
  font-weight:900;
  text-shadow:0 0 18px rgba(225,84,75,.85);
  pointer-events:none;
  animation:float .75s ease both;
}
.hit{animation:hit .26s ease}
.overlay{
  position:fixed;
  inset:0;
  z-index:50;
  display:none;
  place-items:center;
  padding:18px;
  background:rgba(0,0,0,.86);
  backdrop-filter:blur(5px);
}
.overlay.show{display:grid}
.victory{
  width:min(520px,100%);
  position:relative;
  border:1px solid rgba(234,219,196,.35);
  border-radius:24px;
  background:
    radial-gradient(circle at 50% 10%,rgba(143,39,36,.26),transparent 35%),
    linear-gradient(180deg,#17110e,#060504);
  box-shadow:0 30px 80px rgba(0,0,0,.68),inset 0 0 0 7px rgba(0,0,0,.28);
  padding:34px 24px;
  text-align:center;
}
.victory:before{
  content:"";
  position:absolute;
  inset:14px;
  border:1px dotted rgba(234,219,196,.3);
  border-radius:18px;
}
.victory h2{
  position:relative;
  margin:18px 0 10px;
  font-size:42px;
  line-height:.95;
  text-transform:uppercase;
  letter-spacing:2px;
}
.victory p{
  position:relative;
  margin:0 0 22px;
  color:var(--muted);
  font-family:system-ui,-apple-system,Segoe UI,sans-serif;
}
.victory .btn{position:relative}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.42}}
@keyframes float{0%{transform:translateY(15px);opacity:0}20%{opacity:1}100%{transform:translateY(-30px);opacity:0}}
@keyframes hit{0%{box-shadow:0 12px 28px rgba(0,0,0,.30)}50%{box-shadow:0 0 32px rgba(225,84,75,.52)}100%{box-shadow:0 12px 28px rgba(0,0,0,.30)}}

/* iPhone très étroit */
@media(max-width:390px){
  .actions{width:220px}
  .btn{font-size:11px;padding:8px 8px}
  .card{min-height:150px;padding:10px}
  .player-head{grid-template-columns:28px 1fr;gap:5px}
  .role{font-size:25px}
  .player-name{font-size:15px;letter-spacing:.6px}
  .num{font-size:52px}
  .card-controls .round{width:42px;height:42px}
  .tokens{gap:5px}
}

/* Tablette paysage : garde l'effet table mais propre */
@media (min-width:900px) and (min-height:560px){
  html,body{height:100%;overflow:hidden}
  .app{height:100dvh;padding:14px}
  .shell{height:100%;max-width:none}
  .header{
    position:absolute;
    z-index:20;
    left:24px;
    top:20px;
    right:24px;
    margin:0;
  }
  .board{
    height:100%;
    position:relative;
    display:block;
    border:1px solid rgba(234,219,196,.13);
    border-radius:26px;
    overflow:hidden;
    box-shadow:inset 0 0 80px rgba(0,0,0,.65);
  }
  .ritual{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:min(43vw,510px);
    max-width:56vh;
    aspect-ratio:1/1;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .ritual:before{border-radius:50%}
  .ritual-inner{width:82%}
  .players{display:block}
  .card{
    position:absolute;
    width:31vw;
    max-width:430px;
    min-height:150px;
  }
  .card[data-id="killer1"]{left:50%;top:7%;transform:translateX(-50%) rotate(180deg)}
  .card[data-id="killer2"]{left:50%;bottom:7%;transform:translateX(-50%)}
  .card[data-id="survivor1"]{left:4.5%;top:50%;transform:translateY(-50%) rotate(90deg);width:32vw}
  .card[data-id="survivor2"]{right:4.5%;top:50%;transform:translateY(-50%) rotate(-90deg);width:32vw}
  .tools{
    position:absolute;
    left:22px;
    bottom:18px;
    width:auto;
    display:flex;
  }
  .history{
    position:absolute;
    left:50%;
    bottom:18px;
    transform:translateX(-50%);
    width:min(430px,40vw);
    margin:0;
  }
}
</style>
</head>
<body>
<div class="app">
  <div class="shell">
    <header class="header">
      <div>
        <div class="logo">VHS</div>
        <div class="version">Compagnon<br>V8.1</div>
      </div>
      <div class="actions">
        <button class="btn" id="fullscreen">Plein écran</button>
        <button class="btn active" id="wake">Écran allumé</button>
        <button class="btn active wide" id="auto">Victoire auto</button>
      </div>
    </header>

    <main class="board">
      <section class="ritual">
        <div class="ritual-inner">
          <div class="ritual-head">
            <div class="emoji-big">🕯️</div>
            <div class="ritual-title">Le Rituel</div>
            <div class="emoji-big">⛧</div>
          </div>
          <div class="ritual-mid">
            <button class="round" data-rhp="-1">−</button>
            <div class="ritual-hp">
              <span class="ritual-num" id="ritualHp">9</span>
              <span class="ritual-max">/ 9 PV</span>
            </div>
            <button class="round" data-rhp="1">+</button>
          </div>

          <div class="label">Progression <span id="progLabel">0/7</span></div>
          <div class="tokens" id="progTokens"></div>

          <div class="label">Boucliers</div>
          <div class="shields" id="shieldTokens"></div>
        </div>
      </section>

      <section class="players" id="players"></section>

      <div class="tools">
        <button class="btn" id="reset">Nouvelle partie</button>
        <button class="btn" id="minusAll">Tous -1</button>
        <button class="btn" id="save">Sauver</button>
        <button class="btn" id="load">Charger</button>
      </div>

      <div class="history" id="history">Historique vide.</div>
    </main>
  </div>
</div>

<div class="overlay" id="victory">
  <div class="victory">
    <h2 id="victoryTitle">Victoire</h2>
    <p id="victoryText"></p>
    <button class="btn" id="victoryReset">Nouvelle partie</button>
  </div>
</div>

<script>
const START = {
  killer1:{label:"Tueur 1", role:"killer", icon:"👻", hp:14, max:20},
  survivor1:{label:"Surv. 1", role:"survivor", icon:"🩹", hp:14, max:20},
  survivor2:{label:"Surv. 2", role:"survivor", icon:"✋", hp:14, max:20},
  killer2:{label:"Tueur 2", role:"killer", icon:"💀", hp:14, max:20},
  ritual:{hp:9,max:9,prog:0,shield:0}
};
let state = JSON.parse(JSON.stringify(START));
let history = [];
let autoWin = true;
let wakeLock = null;

const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];

function render(){
  renderPlayers();
  renderRitual();
  renderHistory();
  save(false);
  checkWin();
}

function renderPlayers(){
  const order = ["killer1","survivor1","survivor2","killer2"];
  $("#players").innerHTML = order.map(id=>{
    const p = state[id];
    const pct = Math.max(0, Math.min(100, p.hp / p.max * 100));
    return `
      <article class="card ${p.role} ${p.hp<=0?"dead":""} ${p.hp<=3&&p.hp>0?"critical":""}" data-id="${id}">
        <div class="player-head">
          <div class="role">${p.icon}</div>
          <div class="player-name" contenteditable="true" spellcheck="false" data-name="${id}">${p.label}</div>
        </div>
        <div class="player-hp">
          <span class="num">${p.hp}</span><span class="max"> / ${p.max}</span>
        </div>
        <div class="card-controls">
          <button class="round" data-hp="${id}" data-delta="-1">−</button>
          <button class="round" data-hp="${id}" data-delta="1">+</button>
        </div>
        <div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div>
        <div class="dead-badge">✝ Éliminé</div>
      </article>
    `;
  }).join("");
  bindPlayers();
}

function bindPlayers(){
  $$("[data-hp]").forEach(btn=>{
    btn.onclick = () => changeHp(btn.dataset.hp, Number(btn.dataset.delta));
    let timer, interval;
    btn.onpointerdown = () => {
      timer = setTimeout(()=>{
        interval = setInterval(()=>changeHp(btn.dataset.hp, Number(btn.dataset.delta)), 95);
      }, 430);
    };
    const stop = () => {clearTimeout(timer); clearInterval(interval)};
    btn.onpointerup = stop;
    btn.onpointerleave = stop;
    btn.onpointercancel = stop;
  });

  $$("[data-name]").forEach(el=>{
    el.onkeydown = e => {
      if(e.key === "Enter"){ e.preventDefault(); el.blur(); }
    };
    el.onblur = () => {
      const id = el.dataset.name;
      state[id].label = el.textContent.trim() || START[id].label;
      save(false);
    };
  });
}

function renderRitual(){
  $("#ritualHp").textContent = state.ritual.hp;
  $("#progLabel").textContent = `${state.ritual.prog}/7`;

  $("#progTokens").innerHTML = "";
  for(let i=1;i<=7;i++){
    const b = document.createElement("button");
    b.className = "token" + (i <= state.ritual.prog ? " on" : "");
    b.onclick = () => {
      state.ritual.prog = i === state.ritual.prog ? i-1 : i;
      log(`Progression Rituel : ${state.ritual.prog}/7`);
      render();
    };
    $("#progTokens").appendChild(b);
  }

  $("#shieldTokens").innerHTML = "";
  for(let i=1;i<=3;i++){
    const b = document.createElement("button");
    b.className = "shield" + (i <= state.ritual.shield ? " on" : "");
    b.textContent = "🛡️";
    b.onclick = () => {
      state.ritual.shield = i === state.ritual.shield ? i-1 : i;
      log(`Boucliers Rituel : ${state.ritual.shield}/3`);
      render();
    };
    $("#shieldTokens").appendChild(b);
  }
}

function changeHp(id, delta){
  const p = state[id];
  const old = p.hp;
  p.hp = Math.max(0, Math.min(p.max, p.hp + delta));
  const real = p.hp - old;
  if(!real) return;
  log(`${p.label} ${real>0?"+":""}${real} PV`);
  render();
  flash(id, real);
}

function changeRitual(delta){
  const old = state.ritual.hp;
  state.ritual.hp = Math.max(0, Math.min(state.ritual.max, state.ritual.hp + delta));
  const real = state.ritual.hp - old;
  if(!real) return;
  log(`Rituel ${real>0?"+":""}${real} PV`);
  renderRitual();
  renderHistory();
  save(false);
  checkWin();
}

function flash(id, real){
  const card = document.querySelector(`[data-id="${id}"]`);
  if(!card) return;
  card.classList.add("hit");
  setTimeout(()=>card.classList.remove("hit"), 300);
  const f = document.createElement("div");
  f.className = "float";
  f.textContent = real > 0 ? `+${real}` : `${real}`;
  f.style.color = real > 0 ? "#eadbc4" : "#ff6b62";
  card.appendChild(f);
  setTimeout(()=>f.remove(), 780);
}

function log(txt){
  const t = new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
  history.unshift(`${t} — ${txt}`);
  history = history.slice(0,8);
}

function renderHistory(){
  $("#history").innerHTML = history.length ? history.join("<br>") : "Historique vide.";
}

function checkWin(){
  if(!autoWin) return;
  let title="", text="";
  if(state.killer1.hp<=0 && state.killer2.hp<=0){
    title="Victoire des Survivants"; text="Les deux Tueurs sont éliminés.";
  } else if(state.ritual.prog>=7){
    title="Victoire des Survivants"; text="Le Rituel est accompli.";
  } else if(state.survivor1.hp<=0 && state.survivor2.hp<=0){
    title="Victoire des Tueurs"; text="Tous les Survivants sont morts.";
  } else if(state.ritual.hp<=0){
    title="Victoire des Tueurs"; text="Le Rituel est détruit.";
  }
  if(title){
    $("#victoryTitle").textContent = title;
    $("#victoryText").textContent = text;
    $("#victory").classList.add("show");
  }
}

function reset(){
  state = JSON.parse(JSON.stringify(START));
  history = [];
  $("#victory").classList.remove("show");
  log("Nouvelle partie V8.1");
  render();
}

function save(show=true){
  try{
    localStorage.setItem("vhs_compagnon_v81_clean_v3", JSON.stringify({state,history,autoWin}));
    if(show){log("Partie sauvegardée"); renderHistory();}
  }catch(e){}
}

function load(){
  try{
    const data = JSON.parse(localStorage.getItem("vhs_compagnon_v81_clean_v3"));
    if(data && data.state){
      state = data.state;
      history = data.history || [];
      autoWin = data.autoWin ?? true;
      $("#auto").classList.toggle("active", autoWin);
      $("#victory").classList.remove("show");
      log("Partie chargée");
      render();
    }
  }catch(e){}
}

async function requestWake(){
  if(!("wakeLock" in navigator)) return;
  try{ wakeLock = await navigator.wakeLock.request("screen"); }catch(e){}
}
function releaseWake(){
  if(wakeLock){ wakeLock.release(); wakeLock = null; }
}

$$("[data-rhp]").forEach(b=>b.onclick = () => changeRitual(Number(b.dataset.rhp)));
$("#reset").onclick = reset;
$("#victoryReset").onclick = reset;
$("#save").onclick = () => save(true);
$("#load").onclick = load;
$("#minusAll").onclick = () => ["killer1","survivor1","survivor2","killer2"].forEach(id=>changeHp(id,-1));
$("#auto").onclick = () => {
  autoWin = !autoWin;
  $("#auto").classList.toggle("active", autoWin);
  log(`Victoire auto ${autoWin?"activée":"désactivée"}`);
  renderHistory();
  checkWin();
};
$("#wake").onclick = async () => {
  const active = $("#wake").classList.toggle("active");
  if(active) await requestWake(); else releaseWake();
};
$("#fullscreen").onclick = async () => {
  try{
    if(!document.fullscreenElement) await document.documentElement.requestFullscreen();
    else await document.exitFullscreen();
  }catch(e){}
};
document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="visible" && $("#wake").classList.contains("active")) requestWake();});

requestWake();
render();
</script>
</body>
</html>
